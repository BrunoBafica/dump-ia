name: Deploy DumpAI

# Roda automaticamente sempre que houver um push na branch main.
# Também pode ser disparado manualmente pela aba "Actions" do GitHub.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar na VPS e rodar o deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            bash ${{ secrets.VPS_PROJECT_PATH }}/deploy.sh
