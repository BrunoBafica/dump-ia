{% extends "base.html" %}
{% block title %}Trocar senha · DumpAI{% endblock %}
{% block content %}
<div class="container-narrow">
  <div class="panel">
    <p class="subtitle" style="margin-bottom: 4px;"><a href="/dashboard">&larr; voltar ao dashboard</a></p>
    <h1>Trocar senha</h1>

    {% if success %}
      <div class="alert alert-success">Senha alterada com sucesso.</div>
    {% endif %}
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="/account/change-password">
      <label for="current_password">Senha atual</label>
      <input type="password" id="current_password" name="current_password" required autofocus>

      <label for="new_password">Nova senha</label>
      <input type="password" id="new_password" name="new_password" required minlength="6">

      <label for="new_password_confirm">Confirmar nova senha</label>
      <input type="password" id="new_password_confirm" name="new_password_confirm" required minlength="6">

      <div style="margin-top: 24px;">
        <button type="submit" class="btn btn-primary btn-block">Salvar nova senha</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
